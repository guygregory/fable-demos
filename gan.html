<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GAN i4 — 3D Speedcube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,500;0,700;0,900;1,900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --gan-blue:#2c9bf0;
    --ink:#e9edf2;
    --ink-dim:#8a93a0;
    --panel:rgba(10,13,18,.72);
    --line:rgba(255,255,255,.08);
    --mono:'IBM Plex Mono',monospace;
    --disp:'Archivo',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:var(--mono);color:var(--ink);
    background:radial-gradient(120% 90% at 50% 30%, #232a36 0%, #14181f 45%, #0a0c10 100%)}
  canvas{display:block;touch-action:none}
  #ui{position:fixed;inset:0;pointer-events:none;z-index:10}
  #ui>*{pointer-events:auto}

  #brand{position:absolute;top:20px;left:24px;user-select:none}
  #brand h1{font-family:var(--disp);font-weight:900;font-style:italic;font-size:34px;
    letter-spacing:.02em;line-height:1;color:var(--ink)}
  #brand h1 b{color:var(--gan-blue);font-weight:900}
  #brand .sub{font-size:9.5px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-dim);margin-top:7px}

  #stats{position:absolute;top:20px;right:24px;text-align:right;user-select:none;
    display:flex;gap:26px}
  #stats .cell .label{font-size:9px;letter-spacing:.3em;color:var(--ink-dim);text-transform:uppercase}
  #stats .cell .val{font-family:var(--disp);font-weight:700;font-size:26px;margin-top:3px;
    font-variant-numeric:tabular-nums;letter-spacing:.03em}
  #timer.running{color:var(--gan-blue)}

  #bar{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:11px}
  #buttons{display:flex;gap:10px}
  button{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:8px;padding:11px 26px;cursor:pointer;
    backdrop-filter:blur(8px);transition:border-color .15s,color .15s,transform .08s}
  button:hover{border-color:var(--gan-blue);color:var(--gan-blue)}
  button:active{transform:scale(.96)}
  #legend{font-size:10.5px;letter-spacing:.06em;color:var(--ink-dim);text-align:center;
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:7px 16px;backdrop-filter:blur(8px)}
  #legend b{color:var(--ink);font-weight:600}
  @media (max-width:640px){ #legend .kbd{display:none} #brand h1{font-size:26px} }

  #toast{position:absolute;left:50%;top:18%;transform:translate(-50%,-10px);
    font-family:var(--disp);font-weight:900;font-style:italic;font-size:42px;letter-spacing:.05em;
    color:var(--gan-blue);text-shadow:0 4px 30px rgba(44,155,240,.55);
    opacity:0;pointer-events:none;transition:opacity .4s,transform .4s}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  #toast .detail{display:block;font-family:var(--mono);font-style:normal;font-weight:500;
    font-size:13px;letter-spacing:.2em;color:var(--ink);text-align:center;margin-top:8px}
</style>
</head>
<body>
<div id="ui">
  <div id="brand">
    <h1><b>GAN</b> i4</h1>
    <div class="sub">356 · Magnetic Speedcube · 56 mm</div>
  </div>
  <div id="stats">
    <div class="cell"><div class="label">Time</div><div class="val" id="timer">0:00.0</div></div>
    <div class="cell"><div class="label">Moves</div><div class="val" id="moves">0</div></div>
  </div>
  <div id="toast">SOLVED<span class="detail" id="toastDetail"></span></div>
  <div id="bar">
    <div id="buttons">
      <button id="scrambleBtn">Scramble</button>
      <button id="resetBtn">Reset</button>
    </div>
    <div id="legend"><b>drag a face</b> to turn a layer &nbsp;·&nbsp; <b>drag the background</b> to orbit
      <span class="kbd">&nbsp;·&nbsp; keys <b>U D L R F B</b> (+shift = ccw) &nbsp;·&nbsp; <b>X Y Z</b> rotate cube &nbsp;·&nbsp; <b>space</b> scramble &nbsp;·&nbsp; <b>esc</b> reset</span></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ============================== renderer / scene ============================== */
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(34, innerWidth/innerHeight, 0.1, 100);
camera.position.set(5.2, 4.1, 6.6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.enablePan = false;
controls.minDistance = 5.5;
controls.maxDistance = 16;
controls.rotateSpeed = 0.85;

/* ============================== lighting ============================== */
const key = new THREE.DirectionalLight(0xffffff, 1.5);
key.position.set(6, 10, 7);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = key.shadow.camera.bottom = -4;
key.shadow.camera.right = key.shadow.camera.top = 4;
key.shadow.camera.near = 4; key.shadow.camera.far = 26;
key.shadow.radius = 7;
key.shadow.bias = -0.0004;
scene.add(key);

scene.add(new THREE.HemisphereLight(0xbfd4ee, 0x2a2218, 0.35));
const fill = new THREE.DirectionalLight(0x9fc4ff, 0.35);
fill.position.set(-7, 3, -5);
scene.add(fill);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.ShadowMaterial({ opacity: 0.32 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -2.6;
ground.receiveShadow = true;
scene.add(ground);

/* ============================== GAN i4 colours ============================== */
/* Stickerless GAN shades — white up, yellow down, green front, blue back,
   red right, orange left (standard western/GAN scheme). */
const FACES = {
  px:{ n:new THREE.Vector3( 1,0,0), color:0xd6262e, name:'R' }, // red
  nx:{ n:new THREE.Vector3(-1,0,0), color:0xff7a12, name:'L' }, // orange
  py:{ n:new THREE.Vector3( 0,1,0), color:0xf2f5f6, name:'U' }, // white
  ny:{ n:new THREE.Vector3( 0,-1,0),color:0xffd31a, name:'D' }, // yellow
  pz:{ n:new THREE.Vector3( 0,0,1), color:0x12a85a, name:'F' }, // green
  nz:{ n:new THREE.Vector3( 0,0,-1),color:0x0e6bd6, name:'B' }  // blue
};
const FACE_ORDER = ['px','nx','py','ny','pz','nz']; // BoxGeometry group order

function plastic(color, extra={}){
  return new THREE.MeshPhysicalMaterial(Object.assign({
    color, roughness:0.26, metalness:0,
    clearcoat:0.85, clearcoatRoughness:0.22,
    envMapIntensity:0.85
  }, extra));
}
const faceMats = {};
for (const k of FACE_ORDER) faceMats[k] = plastic(FACES[k].color);
const innerMat = new THREE.MeshPhysicalMaterial({
  color:0x16181d, roughness:0.55, metalness:0, envMapIntensity:0.3
});

/* ============================== GAN logo texture ============================== */
/* The GAN mark: an isometric cube whose three visible faces carry G (top),
   A (left) and N (right) as white negative-space cuts in GAN blue. */
function ganLogoTexture(){
  const c = document.createElement('canvas');
  c.width = c.height = 1024;
  const g = c.getContext('2d');
  const WHITE = '#f2f5f6', BLUE = '#0e96d8';
  g.fillStyle = WHITE;
  g.fillRect(0, 0, 1024, 1024);

  const cx = 512, cy = 512, s = 340;          // s = cube edge length (px)
  const X = 0.866 * s, Y = 0.5 * s;
  // affine maps: unit square (u,v) -> screen for each visible face
  const TOP   = { a:X, b:-Y, c:X, d:Y,  e:cx - X, f:cy - Y };
  const LEFT  = { a:X, b:Y,  c:0, d:s,  e:cx - X, f:cy - Y };
  const RIGHT = { a:X, b:-Y, c:0, d:s,  e:cx,     f:cy     };
  const setT = t => g.setTransform(t.a, t.b, t.c, t.d, t.e, t.f);
  const W = 0.14;                              // letter channel width (face units)
  const TAB = 0.065;                           // letter overhang past the silhouette

  // blue faces
  for (const t of [TOP, LEFT, RIGHT]){ setT(t); g.fillStyle = BLUE; g.fillRect(0, 0, 1, 1); }

  // G — square spiral channel carved into the top face, opening through the
  //     upper-right edge; its outer stroke juts past the silhouette
  setT(TOP);
  g.strokeStyle = WHITE; g.lineWidth = W; g.lineCap = 'butt'; g.lineJoin = 'miter';
  g.beginPath();
  g.moveTo(1.1, 0.355);
  g.lineTo(0.335, 0.355);
  g.lineTo(0.335, 0.665);
  g.lineTo(0.72, 0.665);
  g.lineTo(0.72, 0.51);
  g.lineTo(0.515, 0.51);
  g.stroke();
  g.fillStyle = BLUE;
  g.fillRect(1, 0.09, TAB, 0.195);             // protruding tip of the outer stroke

  // A — flat-top A filling the left face: counter slot cuts through the outer
  //     edge, crossbar tip pokes out, legs extend past the bottom edge
  setT(LEFT);
  g.fillStyle = BLUE;
  g.fillRect(-TAB, 0.315 + W, TAB, 0.155);     // crossbar tip
  g.fillRect(0, 1, 0.36, TAB);                 // left leg overhang
  g.fillRect(0.64, 1, 0.36, TAB);              // right leg overhang
  g.fillStyle = WHITE;
  g.fillRect(-0.1, 0.315, 0.74, W);            // counter slot, through the edge
  g.fillRect(0.36, 0.62, 0.28, 0.38 + TAB + 0.05); // gap between the legs

  // N — diagonal notches carved into the right face; stems overhang the bottom
  setT(RIGHT);
  g.fillStyle = BLUE;
  g.fillRect(0, 1, 0.285, TAB);                // left stem overhang
  g.fillRect(0.60, 1, 0.40, TAB);              // diagonal + right stem overhang
  g.fillStyle = WHITE;
  g.beginPath();                               // upper-right notch
  g.moveTo(0.40, -0.02); g.lineTo(0.715, -0.02); g.lineTo(0.715, 0.60);
  g.closePath(); g.fill();
  g.beginPath();                               // lower-left notch (cut past edge)
  const vN = 1 + TAB + 0.01, uN = 0.285 + 0.508 * (vN - 0.40);
  g.moveTo(0.285, 0.40); g.lineTo(0.285, vN); g.lineTo(uN, vN);
  g.closePath(); g.fill();

  // white seams along the three internal cube edges
  g.setTransform(1, 0, 0, 1, 0, 0);
  g.strokeStyle = WHITE; g.lineWidth = s * 0.075; g.lineCap = 'butt';
  g.beginPath();
  g.moveTo(cx - X, cy - Y); g.lineTo(cx, cy);    // top/left edge
  g.moveTo(cx + X, cy - Y); g.lineTo(cx, cy);    // top/right edge
  g.moveTo(cx, cy);         g.lineTo(cx, cy + s*(1 + TAB)); // left/right edge
  g.stroke();

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

/* ============================== build the cube ============================== */
const SPACING = 1.0;
const SIZE = 0.965;
const cubeRoot = new THREE.Group();
scene.add(cubeRoot);

const cubieGeo = new RoundedBoxGeometry(SIZE, SIZE, SIZE, 4, 0.085);
const cubies = [];
const logoMat = plastic(0xffffff, { map: ganLogoTexture() });

for (let x=-1; x<=1; x++) for (let y=-1; y<=1; y++) for (let z=-1; z<=1; z++){
  if (x===0 && y===0 && z===0) continue;
  const grid = new THREE.Vector3(x, y, z);
  const mats = FACE_ORDER.map(k => {
    const n = FACES[k].n;
    return (grid.dot(n) > 0.5) ? faceMats[k] : innerMat;
  });
  if (x===0 && y===1 && z===0) mats[2] = logoMat; // GAN logo on the white centre
  const m = new THREE.Mesh(cubieGeo, mats);
  m.castShadow = true;
  m.position.copy(grid).multiplyScalar(SPACING);
  m.userData.grid = grid.clone();
  m.userData.baseGrid = grid.clone();
  cubeRoot.add(m);
  cubies.push(m);
}

/* ============================== turn engine ============================== */
const AXES = { x:new THREE.Vector3(1,0,0), y:new THREE.Vector3(0,1,0), z:new THREE.Vector3(0,0,1) };
const pivot = new THREE.Group();
scene.add(pivot);

const queue = [];
let active = null;

const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeOutBack = t => { const c = 1.45; return 1 + (c+1)*Math.pow(t-1,3) + c*Math.pow(t-1,2); };

function enqueue(move){ queue.push(move); }

function startNext(now){
  const mv = queue.shift();
  const axisVec = AXES[mv.axis];
  const members = cubies.filter(c =>
    mv.layer === 'all' || Math.round(c.userData.grid[mv.axis]) === mv.layer);
  pivot.quaternion.identity();
  for (const c of members) pivot.add(c);
  active = {
    ...mv, axisVec, members, t0: now,
    qTurn: new THREE.Quaternion().setFromAxisAngle(axisVec, mv.dir * Math.PI/2)
  };
}

function finishTurn(){
  const { members, qTurn } = active;
  for (const c of members){
    cubeRoot.add(c);
    c.userData.grid.applyQuaternion(qTurn).round();
    c.position.copy(c.userData.grid).multiplyScalar(SPACING);
    c.quaternion.premultiply(qTurn).normalize();
  }
  const wasActive = active;
  active = null;
  if (wasActive.user || wasActive.checkSolve) checkSolved();
}

function stepTurns(now){
  if (!active && queue.length) startNext(now);
  if (!active) return;
  const t = Math.min(1, (now - active.t0) / active.dur);
  const ease = active.snappy ? easeOutBack(t) : easeOutCubic(t);
  pivot.quaternion.setFromAxisAngle(active.axisVec, active.dir * Math.PI/2 * ease);
  if (t >= 1) finishTurn();
}

/* ============================== solve / HUD state ============================== */
const timerEl = document.getElementById('timer');
const movesEl = document.getElementById('moves');
const toastEl = document.getElementById('toast');
const toastDetail = document.getElementById('toastDetail');

let moveCount = 0, timerRunning = false, timerStart = 0, timerVal = 0, scrambled = false;

function fmtTime(ms){
  const m = Math.floor(ms/60000), s = Math.floor(ms%60000/1000), t = Math.floor(ms%1000/100);
  return `${m}:${String(s).padStart(2,'0')}.${t}`;
}
function userMove(){
  moveCount++;
  movesEl.textContent = moveCount;
  if (scrambled && !timerRunning){
    timerRunning = true;
    timerStart = performance.now();
    timerEl.classList.add('running');
  }
}
function isSolved(){
  const q0 = cubies[0].quaternion;
  return cubies.every(c => Math.abs(c.quaternion.dot(q0)) > 0.9999);
}
function checkSolved(){
  if (queue.length || !isSolved()) return;
  if (timerRunning){
    timerRunning = false;
    timerVal = performance.now() - timerStart;
    timerEl.textContent = fmtTime(timerVal);
    timerEl.classList.remove('running');
    toastDetail.textContent = `${fmtTime(timerVal)} · ${moveCount} moves`;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3200);
  }
  scrambled = false;
}

/* ============================== drag-to-turn ============================== */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let drag = null;

function snapToAxis(v){
  const ax = Math.abs(v.x), ay = Math.abs(v.y), az = Math.abs(v.z);
  if (ax >= ay && ax >= az) return { axis:'x', dir: Math.sign(v.x) || 1 };
  if (ay >= az)             return { axis:'y', dir: Math.sign(v.y) || 1 };
  return { axis:'z', dir: Math.sign(v.z) || 1 };
}

function pickCubie(clientX, clientY){
  pointer.set((clientX/innerWidth)*2 - 1, -(clientY/innerHeight)*2 + 1);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(cubies, true);
  if (!hits.length) return null;
  const hit = hits[0];
  let obj = hit.object;
  while (obj && !obj.userData.grid) obj = obj.parent;
  if (!obj) return null;
  const wq = new THREE.Quaternion();
  hit.object.getWorldQuaternion(wq);
  const n = hit.face.normal.clone().applyQuaternion(wq);
  const s = snapToAxis(n);
  const normal = AXES[s.axis].clone().multiplyScalar(s.dir);
  return { cubie: obj, normal };
}

renderer.domElement.addEventListener('pointerdown', e => {
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  const hit = pickCubie(e.clientX, e.clientY);
  if (hit){
    drag = { ...hit, x:e.clientX, y:e.clientY, fired:false, id:e.pointerId };
    controls.enabled = false;
  }
});

addEventListener('pointermove', e => {
  if (!drag || e.pointerId !== drag.id) return;
  if (e.pointerType === 'mouse' && e.buttons === 0){ endDrag(e); return; }
  if (drag.fired) return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  if (Math.hypot(dx, dy) < 14) return;
  // screen delta -> world direction, projected onto the touched face plane
  const right = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0);
  const up    = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 1);
  const d = right.multiplyScalar(dx).addScaledVector(up, -dy);
  d.addScaledVector(drag.normal, -d.dot(drag.normal));
  if (d.lengthSq() < 1e-6) return;
  d.normalize();
  const rotVec = new THREE.Vector3().crossVectors(drag.normal, d);
  const s = snapToAxis(rotVec);
  const layer = Math.round(drag.cubie.userData.grid[s.axis]);
  enqueue({ axis:s.axis, layer, dir:s.dir, dur:170, snappy:true, user:true });
  userMove();
  drag.fired = true;
});

function endDrag(e){
  if (drag && e.pointerId === drag.id){
    drag = null;
    controls.enabled = true;
  }
}
addEventListener('pointerup', endDrag);
addEventListener('pointercancel', endDrag);
addEventListener('blur', () => { drag = null; controls.enabled = true; });

/* ============================== keyboard ============================== */
const KEYMAP = {
  u:['y', 1,-1], d:['y',-1, 1],
  r:['x', 1,-1], l:['x',-1, 1],
  f:['z', 1,-1], b:['z',-1, 1],
  x:['x','all',-1], y:['y','all',-1], z:['z','all',-1]
};
addEventListener('keydown', e => {
  if (e.repeat || e.ctrlKey || e.metaKey || e.altKey) return;
  const k = e.key.toLowerCase();
  if (k === ' '){ e.preventDefault(); scramble(); return; }
  if (k === 'escape'){ resetState(true); return; }
  const m = KEYMAP[k];
  if (!m) return;
  const dir = e.shiftKey ? -m[2] : m[2];
  enqueue({ axis:m[0], layer:m[1], dir, dur:170, snappy:true, user:true });
  if (m[1] !== 'all') userMove();
});

/* ============================== scramble / reset ============================== */
function scramble(){
  resetState(false);
  const faces = [['y',1],['y',-1],['x',1],['x',-1],['z',1],['z',-1]];
  let prev = -1;
  for (let i=0; i<22; i++){
    let f;
    do { f = Math.floor(Math.random()*6); } while (f === prev || (f^1) === prev && Math.random() < 0.5);
    prev = f;
    const dir = Math.random() < 0.5 ? 1 : -1;
    enqueue({ axis:faces[f][0], layer:faces[f][1], dir, dur:95,
              checkSolve:false, user:false });
  }
  scrambled = true;
}
function resetState(hard){
  queue.length = 0;
  if (active){ finishTurn(); }
  moveCount = 0; movesEl.textContent = '0';
  timerRunning = false; timerVal = 0; scrambled = false;
  timerEl.textContent = '0:00.0';
  timerEl.classList.remove('running');
  toastEl.classList.remove('show');
  if (hard){
    for (const c of cubies){
      cubeRoot.add(c);
      c.userData.grid.copy(c.userData.baseGrid);
      c.position.copy(c.userData.baseGrid).multiplyScalar(SPACING);
      c.quaternion.identity();
    }
  }
}
document.getElementById('scrambleBtn').addEventListener('click', e => { e.target.blur(); scramble(); });
document.getElementById('resetBtn').addEventListener('click', e => { e.target.blur(); resetState(true); });

/* ============================== loop ============================== */
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

renderer.setAnimationLoop(now => {
  stepTurns(now);
  controls.update();
  if (timerRunning) timerEl.textContent = fmtTime(now - timerStart);
  renderer.render(scene, camera);
});
</script>
</body>
</html>
